<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2263 Timeline</title>
    <link rel="stylesheet" href="../src/styles/shared.css" />
    <link rel="stylesheet" href="../src/pages/calendar/style.css" />
  </head>
  <body>
    <div class="relative min-h-screen w-full overflow-hidden bg-gray-900">
      <div
        class="absolute inset-0 z-0 bg-[url('/src/assets/background.jpg')] bg-cover bg-center blur-md scale-110 opacity-60"
      ></div>
      <!-- <header
        class="h-16 w-full z-50 bg-blue-600/40 fixed top-0 p-2.5"
      ></header> -->

      <main
        class="relative z-10 flex flex-col mt-16 items-center min-h-[calc(100vh-64px)] gap-2"
      >
        <div id="next-gen-countdown">
          <img
            src="../src/assets/icons/hero_generation.png"
            alt="NewGenIcon"
          />Time until Gen 7 start:<br />00d 00h 00m 00s
        </div>
        <div
          class="bg-blue-300/40 p-8 rounded-2xl shadow-2xl max-w-11/12 w-full"
        >
          <div class="flex justify-between">
            <button id="today-button" class="control-button">Today</button>
            <div id="time-buttons-container">
              <button class="control-button" time-window="3d">3 Days</button>
              <button class="control-button" time-window="1w">Week</button>
              <button
                class="control-button hidden md:inline-block!"
                time-window="2w"
              >
                2 Weeks
              </button>
              <button
                class="control-button hidden md:inline-block!"
                time-window="1m"
              >
                Month
              </button>
            </div>
          </div>
          <div id="main-events-timeline"></div>
        </div>
      </main>

      <footer></footer>
    </div>
    <script type="module" src="../src/pages/calendar/calendar.ts"></script>
  </body>
</html>
